_format_version: "3.0"

# =============================================================================
# Global Plugins
# =============================================================================

plugins:
  # ---------------------------------------------------------------------------
  # JWT Authentication (global)
  # Unauthenticated routes are exempted via consumer/route-level overrides
  # ---------------------------------------------------------------------------
  - name: jwt
    enabled: true
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  # ---------------------------------------------------------------------------
  # Rate Limiting (global default: 60 req/min)
  # ---------------------------------------------------------------------------
  - name: rate-limiting
    config:
      minute: 60
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # ---------------------------------------------------------------------------
  # CORS (allow frontend origins)
  # ---------------------------------------------------------------------------
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Request-Id
        - X-Tenant-Id
        - X-Franchise-Id
      exposed_headers:
        - X-Request-Id
      credentials: true
      max_age: 3600

  # ---------------------------------------------------------------------------
  # Request Size Limiting (10 MB)
  # ---------------------------------------------------------------------------
  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes

  # ---------------------------------------------------------------------------
  # Correlation ID
  # ---------------------------------------------------------------------------
  - name: correlation-id
    config:
      header_name: X-Request-Id
      generator: uuid#counter
      echo_downstream: true

# =============================================================================
# Services & Routes
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Auth Service (port 8081)
  # ---------------------------------------------------------------------------
  - name: auth-service
    url: http://auth-service:8081
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: true

  - name: auth-login
    url: http://auth-service:8081
    routes:
      - name: auth-login-route
        paths:
          - /api/auth/login
        strip_path: true
        methods:
          - POST
    plugins:
      - name: jwt
        enabled: false
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: auth-refresh
    url: http://auth-service:8081
